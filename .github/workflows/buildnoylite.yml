name: Build IPA (No Base Tweak)

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "URL to the decrypted IPA file"
        default: ""
        required: true
        type: string

      display_name:
        description: "App Name (Optional)"
        default: "YouTube"
        required: true
        type: string

      bundle_id:
        description: "Bundle ID (Optional)"
        default: "com.google.ios.youtube"
        required: true
        type: string

      opensafari:
        description: "Integrate Open in YouTube (Safari Extension)"
        default: true
        required: false
        type: boolean

      youpip:
        description: "Integrate YouPiP"
        default: true
        required: false
        type: boolean

      ytuhd:
        description: "Integrate YTUHD"
        default: true
        required: false
        type: boolean

      ryd:
        description: "Integrate Return YouTube Dislikes"
        default: true
        required: false
        type: boolean

      ytabconfig:
        description: "Integrate YTABConfig"
        default: true
        required: false
        type: boolean

      youquality:
        description: "Integrate YouQuality"
        default: true
        required: false
        type: boolean

      youchoose:
        description: "Integrate YouChooseQuality"
        default: true
        required: false
        type: boolean

      youslider:
        description: "Integrate YouSlider"
        default: true
        required: false
        type: boolean

      ytsilentvote:
        description: "Integrate YTSilentVote"
        default: true
        required: false
        type: boolean

      ytweaks:
        description: "Integrate YTweaks"
        default: true
        required: false
        type: boolean

      gonerino:
        description: "Integrate Gonerino"
        default: true
        required: false
        type: boolean

      yougetcaption:
        description: "Integrate YouGetCaption"
        default: true
        required: false
        type: boolean

      youspeed:
        description: "Integrate YouSpeed"
        default: true
        required: false
        type: boolean

      youmute:
        description: "Integrate YouMute"
        default: true
        required: false
        type: boolean

      youloop:
        description: "Integrate YouLoop"
        default: true
        required: false
        type: boolean

      demc:
        description: "Integrate DontEatMyContent"
        default: true
        required: false
        type: boolean

      isponsorblock:
        description: "Integrate iSponsorBlock"
        default: true
        required: false
        type: boolean

      ythold:
        description: "Integrate YTHoldForSpeed"
        default: false
        required: false
        type: boolean

      volumeboost:
        description: "Integrate VolumeBoostYT"
        default: false
        required: false
        type: boolean

      nativeshare:
        description: "Integrate YTNativeShare"
        default: false
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-tweaks:
    uses: ./.github/workflows/_build_tweaks.yml
    with:
      isponsorblock: ${{ inputs.isponsorblock }}
      demc: ${{ inputs.demc }}
      ythold: ${{ inputs.ythold }}
      volumeboost: ${{ inputs.volumeboost }}
      nativeshare: ${{ inputs.nativeshare }}
      youpip: ${{ inputs.youpip }}
      ytuhd: ${{ inputs.ytuhd }}
      ryd: ${{ inputs.ryd }}
      ytabconfig: ${{ inputs.ytabconfig }}
      youquality: ${{ inputs.youquality }}
      youslider: ${{ inputs.youslider }}
      ytsilentvote: ${{ inputs.ytsilentvote }}
      ytweaks: ${{ inputs.ytweaks }}
      youchoose: ${{ inputs.youchoose }}
      gonerino: ${{ inputs.gonerino }}
      yougetcaption: ${{ inputs.yougetcaption }}
      youspeed: ${{ inputs.youspeed }}
      youmute: ${{ inputs.youmute }}
      youloop: ${{ inputs.youloop }}
      youpro: false
      opensafari: ${{ inputs.opensafari }}

  package:
    name: Build IPA
    runs-on: macos-15
    needs: build-tweaks
    permissions:
      contents: write
    env:
      HOMEBREW_NO_ENV_HINTS: 1
    steps:
      - name: Download Built Debs
        uses: actions/download-artifact@v8
        with:
          name: built-debs
          path: ${{ github.workspace }}

      - name: Hide Sensitive Inputs
        uses: levibostian/action-hide-sensitive-inputs@v1
        with:
          exclude_inputs: bundle_id,display_name,demc,isponsorblock,ythold,volumeboost,nativeshare,opensafari,youpip,ryd,ytabconfig,youquality,youslider,ytsilentvote,ytweaks,youchoose,gonerino,yougetcaption,youspeed,youmute,youloop

      - name: Download and Validate IPA
        run: |
          wget "${{ inputs.ipa_url }}" --quiet --no-verbose -O youtube.ipa
          file_type=$(file --mime-type -b youtube.ipa)
          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Validation failed: The downloaded file is not a valid IPA. Detected type: $file_type."
            exit 1
          fi

      - name: Get YouTube Version
        run: |
          unzip -q youtube.ipa -d ytextracted
          echo "YT_VERSION=$(grep -A 1 '<key>CFBundleVersion</key>' ytextracted/Payload/YouTube.app/Info.plist | grep '<string>' | awk -F'[><]' '{print $3}')" >> $GITHUB_ENV
          rm -rf ytextracted
          
      - name: Install cyan
        run: |
          pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Inject Tweaks Into IPA
        run: |
          tweaks=""
          if [ "${{ inputs.opensafari }}" = "true" ] && [ -e "OpenYouTubeSafariExtension.appex" ]; then
            tweaks="OpenYouTubeSafariExtension.appex"
          fi
          for f in *.deb; do
            [ -f "$f" ] && tweaks="$tweaks $f"
          done
          cyan -i youtube.ipa -o YouProExtra_IPA_${{ env.YT_VERSION }}.ipa -uwesf $tweaks -n "${{ inputs.display_name }}" -b ${{ inputs.bundle_id }}

      - name: Create a Draft Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          i=1
          while gh release view "youproextra-noytlite-ipa${i}" --repo "$GITHUB_REPOSITORY" &>/dev/null; do
            i=$(( i + 1 ))
          done
          gh release create "youproextra-noytlite-ipa${i}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "YouProExtra_IPA_${{ env.YT_VERSION }}" \
            --draft \
            YouProExtra_IPA_${{ env.YT_VERSION }}.ipa

      - name: Job Summary - Build Complete
        run: echo -e '### 🛠️ Build IPA Complete!' >> $GITHUB_STEP_SUMMARY

      - name: Job Summary - Output the Draft Release Link
        run: |
          echo -e "### 🚀 Draft Release\n\nDraft release has been created successfully! You can view your release here: https://github.com/${{ github.repository }}/releases" >> $GITHUB_STEP_SUMMARY

      - name: Job Summary - Cleanup
        run: |
          echo -e "### 🧹 Cleanup\n\nYou can remove previous GitHub Actions run here: https://github.com/${{ github.repository }}/actions/workflows/delete-old-workflows-run.yml And if you want to delete old draft releases you have then here: https://github.com/${{ github.repository }}/actions/workflows/delete-old-draft-releases.yml" >> $GITHUB_STEP_SUMMARY